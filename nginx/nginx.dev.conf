events {}

http {
    server {
        listen 8080;

        # Rewrite /api/map-tiles/{z}/{x}/{y}.pbf → /public.courts/{z}/{x}/{y}.pbf
        # and proxy to pg_tileserv — mirrors production ALB rule priority 10.
        location ~ ^/api/map-tiles/(\d+)/(\d+)/(\d+)\.pbf$ {
            rewrite ^/api/map-tiles/(.*)$ /public.courts/$1 break;
            proxy_pass         http://pg_tileserv:7800;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Court owner and admin APIs go to the admin backend.
        location ~ ^/api/(owner|admin)/ {
            proxy_pass         http://admin:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Everything else goes to the user backend.
        location / {
            proxy_pass         http://backend:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
    }
}
